spring.application.name=SGS

# Configuracoes de Banco de Dados Postgres
spring.datasource.url=jdbc:postgresql://localhost:5433/sgs_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuracoes JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Desliga a criacao automatica do Hibernate (O Flyway assume isso agora)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true


# Ativa o Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true


# Configuração dos Logs

# Define o nível de log apenas para as classes (esconde os logs excessivos do Spring)
logging.level.br.com.sgs=INFO

# Define a pasta e o nome do arquivo onde os logs serão salvos
logging.file.name=logs/sgs-application.log

# Organiza e facilita a leitura dos logs
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

